<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Road to SCiUS KKU 16</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2em;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-card h3 {
            color: #666;
            font-size: 0.9em;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .stat-card .value {
            font-size: 2.5em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-card .icon {
            font-size: 2em;
            opacity: 0.2;
            float: right;
        }

        .content-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .table-container {
            overflow-x: auto;
            max-height: 500px;
            overflow-y: auto;
            position: relative;
        }

        .table-container::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        .table-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 10px;
        }

        .table-container::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            position: sticky;
            top: 0;
            z-index: 10;
            background: #f8f9fa;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        th {
            background: #f8f9fa;
            font-weight: 600;
            color: #667eea;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: 500;
        }

        .badge-success {
            background: #d4edda;
            color: #155724;
        }

        .badge-warning {
            background: #fff3cd;
            color: #856404;
        }

        .badge-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .badge-info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .badge-primary {
            background: #cfe2ff;
            color: #084298;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .load-more {
            text-align: center;
            padding: 20px;
        }

        .load-more button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 1em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .load-more button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .load-more button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-bar select, .filter-bar input {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-family: 'Prompt', sans-serif;
            font-size: 0.9em;
        }

        .filter-bar select:focus, .filter-bar input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <h1><i class="fas fa-chart-line"></i> Dashboard</h1>
                <p style="color: #666; margin-top: 5px;">ระบบติดตามการทำข้อสอบ Road to SCiUS KKU 16</p>
            </div>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                    <i class="fas fa-home"></i> กลับหน้าหลัก
                </button>
                <button class="btn btn-primary" onclick="refreshData()">
                    <i class="fas fa-sync-alt"></i> รีเฟรช
                </button>
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="font-size: 1.2em;">กำลังโหลดข้อมูล...</p>
        </div>

        <!-- Dashboard Content -->
        <div id="dashboardContent" style="display: none;">
            <!-- Stats Grid -->
            <div class="stats-grid">
                <div class="stat-card">
                    <i class="fas fa-users icon"></i>
                    <h3>ผู้ใช้ทั้งหมด</h3>
                    <div class="value" id="totalUsers">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-calculator icon"></i>
                    <h3>ทำข้อสอบคณิต</h3>
                    <div class="value" id="mathAttempts">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-flask icon"></i>
                    <h3>ทำข้อสอบวิทย์</h3>
                    <div class="value" id="scienceAttempts">0</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-check-circle icon"></i>
                    <h3>ส่งข้อสอบแล้ว</h3>
                    <div class="value" id="totalSubmissions">0</div>
                </div>
            </div>

            <!-- Content Grid -->
            <div class="content-grid">
                <!-- Recent Activities -->
                <div class="card">
                    <h2><i class="fas fa-history"></i> กิจกรรมล่าสุด</h2>
                    <div class="filter-bar">
                        <select id="activityFilter" onchange="filterActivities()">
                            <option value="all">ทั้งหมด</option>
                            <option value="first_login">Login ครั้งแรก</option>
                            <option value="start_exam">เริ่มทำข้อสอบ</option>
                            <option value="view_exam_page">เข้าหน้าข้อสอบ</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table id="activitiesTable">
                            <thead>
                                <tr>
                                    <th>เวลา</th>
                                    <th>กิจกรรม</th>
                                    <th>อีเมล</th>
                                </tr>
                            </thead>
                            <tbody id="activitiesBody">
                            </tbody>
                        </table>
                    </div>
                    <div class="load-more" id="activitiesLoadMore" style="display: none;">
                        <button onclick="loadMoreActivities()">
                            <i class="fas fa-plus-circle"></i> ดูเพิ่มเติม (+25)
                        </button>
                    </div>
                </div>

                <!-- Submissions -->
                <div class="card">
                    <h2><i class="fas fa-paper-plane"></i> การส่งข้อสอบ</h2>
                    <div class="filter-bar">
                        <select id="submissionFilter" onchange="filterSubmissions()">
                            <option value="all">ทั้งหมด</option>
                            <option value="math">คณิตศาสตร์</option>
                            <option value="science">วิทยาศาสตร์</option>
                        </select>
                    </div>
                    <div class="table-container">
                        <table id="submissionsTable">
                            <thead>
                                <tr>
                                    <th>เวลาส่ง</th>
                                    <th>วิชา</th>
                                    <th>อีเมล</th>
                                    <th>เวลาเริ่ม</th>
                                    <th>ใช้เวลา</th>
                                    <th>สถานะ</th>
                                </tr>
                            </thead>
                            <tbody id="submissionsBody">
                            </tbody>
                        </table>
                    </div>
                    <div class="load-more" id="submissionsLoadMore" style="display: none;">
                        <button onclick="loadMoreSubmissions()">
                            <i class="fas fa-plus-circle"></i> ดูเพิ่มเติม (+25)
                        </button>
                    </div>
                </div>
            </div>

            <!-- Users List -->
            <div class="card">
                <h2><i class="fas fa-users"></i> รายชื่อผู้ใช้</h2>
                <div class="filter-bar">
                    <input type="text" id="searchUser" placeholder="ค้นหาอีเมล..." onkeyup="filterUsers()">
                </div>
                <div class="table-container">
                    <table id="usersTable">
                        <thead>
                            <tr>
                                <th>อีเมล</th>
                                <th>ชื่อ</th>
                                <th>Login ครั้งแรก</th>
                                <th>Login ล่าสุด</th>
                                <th>สถานะ</th>
                            </tr>
                        </thead>
                        <tbody id="usersBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD9sCku42XpwwwzEoVwajhtLH0x-cHxkrI",
            authDomain: "scius-kku-15.firebaseapp.com",
            databaseURL: "https://scius-kku-15-default-rtdb.firebaseio.com",
            projectId: "scius-kku-15",
            storageBucket: "scius-kku-15.firebasestorage.app",
            messagingSenderId: "205868945050",
            appId: "1:205868945050:web:70da904a5217bfcb619923",
            measurementId: "G-KQX6F31070"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let allUsers = [];
        let allActivities = [];
        let allSubmissions = [];
        let allAttempts = [];
        let activitiesDisplayCount = 50;
        let submissionsDisplayCount = 50;

        // Load all data
        async function loadData() {
            try {
                document.getElementById('loading').style.display = 'block';
                document.getElementById('dashboardContent').style.display = 'none';

                // Load Users
                const usersSnapshot = await database.ref('users').once('value');
                allUsers = [];
                usersSnapshot.forEach(child => {
                    allUsers.push({ uid: child.key, ...child.val() });
                });

                // Load Activities - เอาทั้งหมดไม่จำกัด
                const logsSnapshot = await database.ref('examLogs').orderByChild('timestamp').once('value');
                allActivities = [];
                logsSnapshot.forEach(child => {
                    allActivities.push({ id: child.key, ...child.val() });
                });
                allActivities.reverse();

                // Load Submissions
                const submissionsSnapshot = await database.ref('examSubmissions').once('value');
                allSubmissions = [];
                submissionsSnapshot.forEach(userChild => {
                    userChild.forEach(subjectChild => {
                        allSubmissions.push({
                            userId: userChild.key,
                            ...subjectChild.val()
                        });
                    });
                });
                allSubmissions.sort((a, b) => b.timestamp - a.timestamp);

                // Load Attempts
                const attemptsSnapshot = await database.ref('examAttempts').once('value');
                allAttempts = { math: 0, science: 0 };
                attemptsSnapshot.forEach(userChild => {
                    userChild.forEach(subjectChild => {
                        const subject = subjectChild.key;
                        const count = subjectChild.numChildren();
                        if (allAttempts[subject] !== undefined) {
                            allAttempts[subject] += count;
                        }
                    });
                });

                updateStats();
                renderUsers();
                renderActivities();
                renderSubmissions();

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboardContent').style.display = 'block';

            } catch (error) {
                console.error('Error loading data:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถโหลดข้อมูลได้: ' + error.message
                });
            }
        }

        function updateStats() {
            document.getElementById('totalUsers').textContent = allUsers.length;
            document.getElementById('mathAttempts').textContent = allAttempts.math || 0;
            document.getElementById('scienceAttempts').textContent = allAttempts.science || 0;
            document.getElementById('totalSubmissions').textContent = allSubmissions.length;
        }

        function renderUsers() {
            const tbody = document.getElementById('usersBody');
            const searchTerm = document.getElementById('searchUser').value.toLowerCase();
            
            const filteredUsers = allUsers.filter(user => 
                user.email.toLowerCase().includes(searchTerm)
            );

            if (filteredUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty-state"><i class="fas fa-inbox"></i><br>ไม่พบข้อมูล</td></tr>';
                return;
            }

            tbody.innerHTML = filteredUsers.map(user => {
                const mathSubmitted = allSubmissions.find(s => s.userId === user.uid && s.subject === 'math');
                const scienceSubmitted = allSubmissions.find(s => s.userId === user.uid && s.subject === 'science');
                
                let statusBadges = '';
                if (mathSubmitted) statusBadges += '<span class="badge badge-success">คณิต ✓</span> ';
                if (scienceSubmitted) statusBadges += '<span class="badge badge-success">วิทย์ ✓</span>';
                if (!mathSubmitted && !scienceSubmitted) statusBadges = '<span class="badge badge-warning">ยังไม่ส่ง</span>';

                return `
                    <tr>
                        <td>${user.email}</td>
                        <td>${user.displayName || '-'}</td>
                        <td>${user.firstLogin ? new Date(user.firstLogin).toLocaleString('th-TH') : '-'}</td>
                        <td>${user.lastLogin ? new Date(user.lastLogin).toLocaleString('th-TH') : '-'}</td>
                        <td>${statusBadges}</td>
                    </tr>
                `;
            }).join('');
        }

        function renderActivities() {
            const tbody = document.getElementById('activitiesBody');
            const filter = document.getElementById('activityFilter').value;
            
            let filtered = allActivities;
            if (filter !== 'all') {
                filtered = allActivities.filter(a => a.action === filter);
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="empty-state"><i class="fas fa-inbox"></i><br>ไม่พบข้อมูล</td></tr>';
                document.getElementById('activitiesLoadMore').style.display = 'none';
                return;
            }

            const displayItems = filtered.slice(0, activitiesDisplayCount);

            tbody.innerHTML = displayItems.map(activity => {
                const actionNames = {
                    'first_login': 'Login ครั้งแรก',
                    'start_exam': 'เริ่มทำข้อสอบ',
                    'view_exam_page': 'เข้าหน้าข้อสอบ',
                    'select_subject': 'เลือกวิชา'
                };

                const actionBadges = {
                    'first_login': 'badge-success',
                    'start_exam': 'badge-primary',
                    'view_exam_page': 'badge-info',
                    'select_subject': 'badge-warning'
                };

                const actionName = actionNames[activity.action] || activity.action;
                const badgeClass = actionBadges[activity.action] || 'badge-info';
                const subject = activity.data?.subject ? ` (${activity.data.subject === 'math' ? 'คณิต' : 'วิทย์'})` : '';

                return `
                    <tr>
                        <td>${new Date(activity.timestamp).toLocaleString('th-TH')}</td>
                        <td><span class="badge ${badgeClass}">${actionName}${subject}</span></td>
                        <td>${activity.email}</td>
                    </tr>
                `;
            }).join('');

            // Show/hide load more button
            if (filtered.length > activitiesDisplayCount) {
                document.getElementById('activitiesLoadMore').style.display = 'block';
            } else {
                document.getElementById('activitiesLoadMore').style.display = 'none';
            }
        }

        function renderSubmissions() {
            const tbody = document.getElementById('submissionsBody');
            const filter = document.getElementById('submissionFilter').value;
            
            let filtered = allSubmissions;
            if (filter !== 'all') {
                filtered = allSubmissions.filter(s => s.subject === filter);
            }

            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty-state"><i class="fas fa-inbox"></i><br>ไม่พบข้อมูล</td></tr>';
                document.getElementById('submissionsLoadMore').style.display = 'none';
                return;
            }

            const displayItems = filtered.slice(0, submissionsDisplayCount);

            tbody.innerHTML = displayItems.map(submission => {
                const subjectName = submission.subject === 'math' ? 'คณิตศาสตร์' : 'วิทยาศาสตร์';
                const badgeClass = submission.subject === 'math' ? 'badge-primary' : 'badge-info';
                
                // Find start time from examLogs
                const startLog = allActivities.find(activity => 
                    activity.email === submission.email && 
                    activity.action === 'start_exam' && 
                    activity.data?.subject === submission.subject
                );
                
                let startTimeStr = '-';
                let durationStr = '-';
                let statusBadge = '';
                
                if (startLog && startLog.timestamp) {
                    const startTime = new Date(startLog.timestamp);
                    const endTime = new Date(submission.timestamp);
                    const durationMs = endTime - startTime;
                    
                    startTimeStr = startTime.toLocaleString('th-TH', { 
                        hour: '2-digit', 
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    
                    // Calculate duration
                    const hours = Math.floor(durationMs / (1000 * 60 * 60));
                    const minutes = Math.floor((durationMs % (1000 * 60 * 60)) / (1000 * 60));
                    const seconds = Math.floor((durationMs % (1000 * 60)) / 1000);
                    
                    if (hours > 0) {
                        durationStr = `${hours} ชม. ${minutes} นาที`;
                    } else if (minutes > 0) {
                        durationStr = `${minutes} นาที ${seconds} วิ`;
                    } else {
                        durationStr = `${seconds} วิ`;
                    }
                    
                    // Check if within time limit (3 hours = 180 minutes)
                    const timeLimit = 1.5 * 60 * 60 * 1000; // 3 hours in milliseconds
                    if (durationMs <= timeLimit) {
                        statusBadge = '<span class="badge badge-success">✓ ทันเวลา</span>';
                    } else {
                        statusBadge = '<span class="badge badge-danger">⚠ เกินเวลา</span>';
                    }
                } else {
                    statusBadge = '<span class="badge badge-warning">? ไม่พบข้อมูล</span>';
                }

                return `
                    <tr>
                        <td>${new Date(submission.timestamp).toLocaleString('th-TH')}</td>
                        <td><span class="badge ${badgeClass}">${subjectName}</span></td>
                        <td>${submission.email}</td>
                        <td>${startTimeStr}</td>
                        <td><strong>${durationStr}</strong></td>
                        <td>${statusBadge}</td>
                    </tr>
                `;
            }).join('');

            // Show/hide load more button
            if (filtered.length > submissionsDisplayCount) {
                document.getElementById('submissionsLoadMore').style.display = 'block';
            } else {
                document.getElementById('submissionsLoadMore').style.display = 'none';
            }
        }

        function filterUsers() {
            renderUsers();
        }

        function filterActivities() {
            activitiesDisplayCount = 50; // Reset to 50 when filter changes
            renderActivities();
        }

        function filterSubmissions() {
            submissionsDisplayCount = 50; // Reset to 50 when filter changes
            renderSubmissions();
        }

        function loadMoreActivities() {
            activitiesDisplayCount += 25;
            renderActivities();
        }

        function loadMoreSubmissions() {
            submissionsDisplayCount += 25;
            renderSubmissions();
        }

        function refreshData() {
            activitiesDisplayCount = 50; // Reset counters
            submissionsDisplayCount = 50;
            loadData();
        }

        // Load data on page load
        window.onload = function() {
            loadData();
        };
    </script>
