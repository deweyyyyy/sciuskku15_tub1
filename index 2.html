<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road to SCiUS KKU 16 - ระบบทำข้อสอบ</title>
    
    <!-- Google Fonts - Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-KQX6F31070"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-KQX6F31070');
</script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        .welcome-screen h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .welcome-screen p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .google-btn {
            background: white;
            border: 2px solid #ddd;
            border-radius: 50px;
            padding: 15px 30px;
            font-size: 1.1em;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .google-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
            border-color: #667eea;
        }

        .google-icon {
            width: 24px;
            height: 24px;
        }

        .subject-selection {
            display: none;
        }

        .subject-selection.active {
            display: block;
        }

        .user-info {
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .user-info img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 10px;
        }

        .user-info h3 {
            color: #333;
            margin-bottom: 5px;
        }

        .user-info p {
            color: #666;
            font-size: 0.9em;
        }

        .subject-btn {
            width: 100%;
            padding: 20px;
            margin: 10px 0;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
        }

        .subject-btn i {
            margin-right: 10px;
        }

        .math-btn {
            background: linear-gradient(135deg, #24be1f 0%, #05acb5 100%);
        }

        .science-btn {
            background: linear-gradient(135deg, #dad12a 0%, #5008d7 100%);
        }

        .subject-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .error-message.active {
            display: block;
        }

        .loading {
            display: none;
            margin: 20px 0;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcomeScreen" style="display: none;">
            <h1><i class="fas fa-graduation-cap"></i> Road to SCiUS KKU 16</h1>
            <p>ระบบทำข้อสอบออนไลน์</p>
            <button class="google-btn" id="googleSignInBtn" style="display: none;">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                ดำเนินการต่อด้วย Google
            </button>
            <div class="error-message" id="browserError"></div>
        </div>

        <!-- Loading -->
        <div class="loading active" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: #666;">กำลังโหลด...</p>
        </div>

        <!-- Subject Selection Screen -->
        <div class="subject-selection" id="subjectSelection">
            <div class="user-info" id="userInfo"></div>
            <h2 style="margin-bottom: 25px; color: #333;">เลือกวิชาที่ต้องการทำข้อสอบ</h2>
            <button class="subject-btn math-btn" onclick="selectSubject('math')">
                <i class="fas fa-calculator"></i> คณิตศาสตร์
            </button>
            <button class="subject-btn science-btn" onclick="selectSubject('science')">
                <i class="fas fa-flask"></i> วิทยาศาสตร์
            </button>
            
            <hr style="margin: 30px 0; border: none; border-top: 2px solid #f0f0f0;">
            
            <button class="subject-btn" onclick="window.location.href='./result.html'" 
                    style="background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%); border: none;">
                <i class="fas fa-trophy"></i> ดูผลคะแนน
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD9sCku42XpwwwzEoVwajhtLH0x-cHxkrI",
            authDomain: "scius-kku-15.firebaseapp.com",
            databaseURL: "https://scius-kku-15-default-rtdb.firebaseio.com",
            projectId: "scius-kku-15",
            storageBucket: "scius-kku-15.firebasestorage.app",
            messagingSenderId: "205868945050",
            appId: "1:205868945050:web:70da904a5217bfcb619923",
            measurementId: "G-KQX6F31070"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let currentUser = null;

        // Check if browser is in-app
        function isInAppBrowser() {
            const ua = navigator.userAgent || navigator.vendor || window.opera;
            return (ua.indexOf('FBAN') > -1) || 
                   (ua.indexOf('FBAV') > -1) || 
                   (ua.indexOf('Instagram') > -1) ||
                   (ua.indexOf('Line') > -1) ||
                   (ua.indexOf('Twitter') > -1);
        }

        // Initialize
        window.onload = function() {
            const welcomeScreen = document.getElementById('welcomeScreen');
            const googleSignInBtn = document.getElementById('googleSignInBtn');
            const browserError = document.getElementById('browserError');

            if (isInAppBrowser()) {
                browserError.innerHTML = '<i class="fas fa-exclamation-triangle"></i> กรุณาเปิดในเบราว์เซอร์ที่รองรับ (Safari, Chrome, Edge, Brave, Opera) เพื่อเข้าสู่ระบบ';
                browserError.classList.add('active');
            } else {
                googleSignInBtn.style.display = 'inline-flex';
            }
        };

        // Auth State Observer
        auth.onAuthStateChanged(async (user) => {
            // Hide loading screen
            document.getElementById('loading').classList.remove('active');
            
            if (user) {
                currentUser = user;
                
                // Check if this is first login (check if user exists in database)
                const userRef = database.ref(`users/${user.uid}`);
                const snapshot = await userRef.once('value');
                
                if (!snapshot.exists()) {
                    // First time login - save user data and log
                    await userRef.set({
                        email: user.email,
                        displayName: user.displayName,
                        photoURL: user.photoURL,
                        firstLogin: firebase.database.ServerValue.TIMESTAMP,
                        lastLogin: firebase.database.ServerValue.TIMESTAMP
                    });
                    
                    await logAction('first_login', { 
                        email: user.email,
                        displayName: user.displayName
                    });
                } else {
                    // Update last login time only
                    await userRef.update({
                        lastLogin: firebase.database.ServerValue.TIMESTAMP
                    });
                }
                
                showSubjectSelection(user);
            } else {
                showWelcomeScreen();
            }
        });

        // Google Sign In
        document.getElementById('googleSignInBtn').addEventListener('click', async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
            } catch (error) {
                console.error('Error signing in:', error);
                Swal.fire({
                    icon: 'error',
                    title: 'เกิดข้อผิดพลาด',
                    text: 'ไม่สามารถเข้าสู่ระบบได้: ' + error.message,
                    confirmButtonColor: '#667eea'
                });
            }
        });

        function showWelcomeScreen() {
            document.getElementById('welcomeScreen').style.display = 'block';
            document.getElementById('subjectSelection').classList.remove('active');
            document.getElementById('loading').classList.remove('active');
        }

        function showSubjectSelection(user) {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('loading').classList.remove('active');
            document.getElementById('subjectSelection').classList.add('active');

            const userInfo = document.getElementById('userInfo');
            userInfo.innerHTML = `
                ${user.photoURL ? `<img src="${user.photoURL}" alt="Profile">` : ''}
                <h3>${user.displayName || 'ผู้ใช้'}</h3>
                <p>${user.email}</p>
            `;
        }

        async function selectSubject(subject) {
            if (!currentUser) {
                Swal.fire({
                    icon: 'warning',
                    title: 'กรุณาเข้าสู่ระบบ',
                    text: 'กรุณาเข้าสู่ระบบก่อนเลือกวิชา',
                    confirmButtonColor: '#667eea'
                });
                return;
            }

            // Log subject selection
            await logAction('select_subject', { 
                email: currentUser.email,
                subject: subject
            });

            // Redirect to test page (allow multiple attempts)
            window.location.href = `test.html?subject=${subject}`;
        }

        async function logAction(action, data) {
            if (!currentUser) return;

            try {
                const logRef = database.ref('examLogs').push();
                await logRef.set({
                    userId: currentUser.uid,
                    email: currentUser.email,
                    action: action,
                    data: data,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
            } catch (error) {
                console.error('Error logging action:', error);
            }
        }
    </script>
</body>
</html>
