<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ผลคะแนน - Road to SCiUS KKU 16</title>
    
    <!-- Google Fonts - Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- SweetAlert2 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11.10.0/dist/sweetalert2.all.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(135deg, #0077ff 0%, #00dc67 100%);
            min-height: 100vh;
            padding: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }
            .header p {
                font-size: 0.95em;
            }
        }

        .loading {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .spinner {
            border: 4px solid rgba(102, 126, 234, 0.2);
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .subject-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .subject-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 3px solid #f0f0f0;
        }

        .subject-icon {
            font-size: 3em;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
        }

        .subject-icon.math {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .subject-icon.science {
            background: linear-gradient(135deg, #56ab2f 0%, #a8e063 100%);
            color: white;
        }

        .subject-title {
            flex: 1;
        }

        .subject-title h2 {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 5px;
        }

        .subject-title .status {
            font-size: 0.9em;
            color: #666;
        }

        .score-display {
            text-align: center;
            margin: 30px 0;
        }

        .raw-score {
            font-size: 4em;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .score-label {
            font-size: 1.1em;
            color: #666;
            margin-bottom: 20px;
        }

        .medal {
            font-size: 4em;
            margin: 20px 0;
        }

        .medal.gold { color: #FFD700; }
        .medal.silver { color: #C0C0C0; }
        .medal.bronze { color: #CD7F32; }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 25px;
        }

        .stat-item {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: 700;
            color: #667eea;
        }

        .no-score {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .no-score i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            font-family: 'Prompt', sans-serif;
            font-size: 1em;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .actions {
            text-align: center;
            margin-top: 30px;
        }

        .error-message {
            background: white;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .error-message i {
            font-size: 4em;
            color: #dc3545;
            margin-bottom: 20px;
        }

        .percentile {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            margin: 20px 0;
            text-align: center;
        }

        .percentile-value {
            font-size: 2em;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-trophy"></i> ผลการประเมิน RoTSUK</h1>
            <p>Road to SCiUS KKU 16</p>
        </div>

        <!-- Loading -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p style="font-size: 1.2em; color: #667eea;">Few sec...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" style="display: none;" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            <h2 style="color: #dc3545; margin-bottom: 15px;">เกิดข้อผิดพลาด</h2>
            <p id="errorText" style="color: #666; margin-bottom: 25px;"></p>
            <a href="index.html" class="btn">กลับหน้าหลัก</a>
        </div>

        <!-- Results -->
        <div id="resultsContainer" style="display: none;">
            <div class="results-grid">
                <!-- Math Card -->
                <div class="subject-card" id="mathCard">
                    <div class="subject-header">
                        <div class="subject-icon math">
                            <i class="fas fa-calculator"></i>
                        </div>
                        <div class="subject-title">
                            <h2>คณิตศาสตร์</h2>
                            <div class="status" id="mathStatus"></div>
                        </div>
                    </div>
                    <div id="mathContent"></div>
                </div>

                <!-- Science Card -->
                <div class="subject-card" id="scienceCard">
                    <div class="subject-header">
                        <div class="subject-icon science">
                            <i class="fas fa-flask"></i>
                        </div>
                        <div class="subject-title">
                            <h2>วิทยาศาสตร์</h2>
                            <div class="status" id="scienceStatus"></div>
                        </div>
                    </div>
                    <div id="scienceContent"></div>
                </div>
            </div>

            <div class="actions">
                <a href="index.html" class="btn btn-secondary">
                    <i class="fas fa-home"></i> กลับหน้าหลัก
                </a>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyD9sCku42XpwwwzEoVwajhtLH0x-cHxkrI",
            authDomain: "scius-kku-15.firebaseapp.com",
            databaseURL: "https://scius-kku-15-default-rtdb.firebaseio.com",
            projectId: "scius-kku-15",
            storageBucket: "scius-kku-15.firebasestorage.app",
            messagingSenderId: "205868945050",
            appId: "1:205868945050:web:70da904a5217bfcb619923",
            measurementId: "G-KQX6F31070"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        let currentUser = null;

        // Google Apps Script Web App URL
        const GS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxGrLAv8sbneO9dD_olJ4VG8uugZnZ7nyxi_tG-5DYVy-Uot52EoQfcrH_rHG7kzIAi/exec';

        // Check authentication
        auth.onAuthStateChanged((user) => {
            console.log('Auth state changed:', user ? user.email : 'No user');
            if (user) {
                currentUser = user;
                loadResults();
            } else {
                console.log('No user logged in, redirecting to index.html');
                window.location.href = 'index.html';
            }
        });

        async function loadResults() {
            try {
                console.log('=== Starting loadResults ===');
                console.log('User email:', currentUser.email);
                console.log('GS_WEB_APP_URL:', GS_WEB_APP_URL);
                
                document.getElementById('loading').style.display = 'block';
                document.getElementById('errorMessage').style.display = 'none';
                document.getElementById('resultsContainer').style.display = 'none';

                // Check release dates
                const mathReleaseDate = new Date('2025-11-07T16:16:00+07:00'); // Thailand timezone
                const scienceReleaseDate = new Date('2025-11-07T09:16:00+07:00'); // Thailand timezone
                const now = new Date();
                const showMathResults = now >= mathReleaseDate;
                const showScienceResults = now >= scienceReleaseDate;
                
                console.log('Current time:', now.toLocaleString('th-TH'));
                console.log('Math release time:', mathReleaseDate.toLocaleString('th-TH'));
                console.log('Science release time:', scienceReleaseDate.toLocaleString('th-TH'));
                console.log('Show math results:', showMathResults);
                console.log('Show science results:', showScienceResults);

                // If neither released yet, don't call API - just show both as pending
                if (!showMathResults && !showScienceResults) {
                    console.log('No results released yet - skipping API call to save credits');
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('resultsContainer').style.display = 'block';
                    
                    displayPendingRelease('math', mathReleaseDate);
                    displayPendingRelease('science', scienceReleaseDate);
                    return;
                }

                const fetchUrl = `${GS_WEB_APP_URL}?email=${encodeURIComponent(currentUser.email)}`;
                console.log('Fetching:', fetchUrl);

                // Add timeout to fetch
                const controller = new AbortController();
                const timeoutId = setTimeout(() => {
                    controller.abort();
                    console.error('Fetch timeout after 30 seconds');
                }, 30000); // 30 second timeout

                // Fetch results from Google Apps Script
                const response = await fetch(fetchUrl, { signal: controller.signal });
                clearTimeout(timeoutId);
                
                console.log('Response status:', response.status);
                console.log('Response ok:', response.ok);
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                console.log('Response data:', data);

                if (data.error) {
                    console.error('Data contains error:', data.error);
                    throw new Error(data.error);
                }

                // Check if any data exists
                if (!data.math && !data.science) {
                    console.warn('No scores found for either subject');
                    Swal.fire({
                        icon: 'info',
                        title: 'ยังไม่มีคะแนน',
                        html: `
                            <p>ไม่พบคะแนนสำหรับอีเมล:</p>
                            <p style="font-weight: 600; color: #667eea;">${currentUser.email}</p>
                            <hr style="margin: 20px 0;">
                            <p style="color: #666;">กรุณาตรวจสอบว่า:</p>
                            <ul style="text-align: left; margin: 15px 0;">
                                <li>ทำข้อสอบและส่งแล้ว</li>
                                <li>ใช้อีเมลเดียวกันกับตอนทำข้อสอบ</li>
                                <li>หากสงสัยกรุณาติดต่อ LINE Open Chat</li>
                            </ul>
                        `,
                        confirmButtonColor: '#667eea',
                        confirmButtonText: 'กลับหน้าหลัก'
                    }).then(() => {
                        window.location.href = 'index.html';
                    });
                    return;
                }

                // Display results
                console.log('Displaying results...');
                displayResults(data);

                document.getElementById('loading').style.display = 'none';
                document.getElementById('resultsContainer').style.display = 'block';
                console.log('=== Results displayed successfully ===');

            } catch (error) {
                console.error('=== Error in loadResults ===');
                console.error('Error type:', error.name);
                console.error('Error message:', error.message);
                console.error('Full error:', error);
                
                let errorMessage = 'เกิดข้อผิดพลาดในการโหลดข้อมูล';
                
                if (error.name === 'AbortError') {
                    errorMessage = 'การโหลดข้อมูลใช้เวลานานเกินไป กรุณาลองใหม่อีกครั้ง';
                } else if (error.message.includes('HTTP error')) {
                    errorMessage = 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ กรุณาตรวจสอบ Google Apps Script URL';
                } else {
                    errorMessage = error.message;
                }
                
                showError(errorMessage);
            }
        }

        function displayResults(data) {
            console.log('=== displayResults called ===');
            console.log('Math data:', data.math);
            console.log('Science data:', data.science);
            
            // Check release dates again to show pending if needed
            const mathReleaseDate = new Date('2025-11-07T16:16:00+07:00');
            const scienceReleaseDate = new Date('2025-11-07T09:16:00+07:00');
            const now = new Date();
            const showMathResults = now >= mathReleaseDate;
            const showScienceResults = now >= scienceReleaseDate;
            
            // Math results
            if (showMathResults) {
                if (data.math) {
                    console.log('Displaying math result');
                    displaySubjectResult('math', data.math, data.mathStats);
                } else {
                    console.log('No math score found');
                    displayNoScore('math');
                }
            } else {
                console.log('Math results not yet released');
                displayPendingRelease('math', mathReleaseDate);
            }

            // Science results
            if (showScienceResults) {
                if (data.science) {
                    console.log('Displaying science result');
                    displaySubjectResult('science', data.science, data.scienceStats);
                } else {
                    console.log('No science score found');
                    displayNoScore('science');
                }
            } else {
                console.log('Science results not yet released');
                displayPendingRelease('science', scienceReleaseDate);
            }
            
            console.log('=== displayResults completed ===');
        }

        function displaySubjectResult(subject, resultData, stats) {
            console.log(`Displaying ${subject} result:`, resultData);
            
            const content = document.getElementById(`${subject}Content`);
            const status = document.getElementById(`${subject}Status`);

            // Check if this is new format (with attempts) or old format
            const hasMultipleAttempts = resultData.attempts && resultData.attempts.length > 0;
            const result = hasMultipleAttempts ? resultData.bestScore : resultData;
            const totalAttempts = resultData.totalAttempts || 1;

            status.innerHTML = `<i class="fas fa-check-circle" style="color: #28a745;"></i> มีคะแนน ${totalAttempts > 1 ? `(${totalAttempts} ครั้ง)` : ''}`;

            // แปลงคะแนนจาก 180 เป็น 90 (หาร 2)
            const displayScore = (result.rawScore / 2).toFixed(1);
            const displayMean = (parseFloat(result.mean) / 2).toFixed(2);
            const maxScore = 90; // คะแนนเต็มที่แสดง

            // Medal
            let medalHTML = '';
            if (result.medal) {
                const medalIcons = {
                    'gold': '<i class="fas fa-medal medal gold"></i>',
                    'silver': '<i class="fas fa-medal medal silver"></i>',
                    'bronze': '<i class="fas fa-medal medal bronze"></i>'
                };
                medalHTML = medalIcons[result.medal] || '';
            }

            // Calculate percentile (คำนวณในหน้า result)
            let percentile = 0;
            if (stats && stats.totalStudents > 0) {
                percentile = ((stats.totalStudents - result.rank + 1) / stats.totalStudents * 100).toFixed(1);
            }

            // Build attempts history HTML
            let attemptsHTML = '';
            if (hasMultipleAttempts && resultData.attempts.length > 1) {
                attemptsHTML = `
                <div style="background: #f8f9fa; border-radius: 15px; padding: 20px; margin-top: 25px;">
                    <h4 style="margin: 0 0 15px 0; color: #333; display: flex; align-items: center; gap: 10px;">
                        <i class="fas fa-history"></i> ประวัติการส่งข้อสอบ (${resultData.attempts.length} ครั้ง)
                    </h4>
                    <div style="display: grid; gap: 10px;">
                        ${resultData.attempts.map((attempt, index) => {
                            const attemptDisplayScore = (attempt.rawScore / 2).toFixed(1);
                            const isBest = attempt.rawScore === result.rawScore && index === resultData.attempts.findIndex(a => a.rawScore === result.rawScore);
                            const attemptNumber = index + 1; // ครั้งที่ตามลำดับจริง (index 0 = ครั้งที่ 1)
                            return `
                            <div style="background: ${isBest ? 'linear-gradient(135deg, #FFD700 0%, #FFA500 100%)' : 'white'}; 
                                        border-radius: 10px; 
                                        padding: 15px; 
                                        display: grid; 
                                        grid-template-columns: auto 1fr auto auto;
                                        gap: 15px;
                                        align-items: center;
                                        ${isBest ? 'color: white; font-weight: 600;' : 'color: #333;'}
                                        box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                                <div style="font-size: 1.1em;">
                                    ${isBest ? '<i class="fas fa-crown"></i>' : ''}
                                    ครั้งที่ ${attemptNumber}
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 1.3em; font-weight: 700;">${attemptDisplayScore}</div>
                                    <div style="font-size: 0.85em; opacity: 0.8;">คะแนน</div>
                                </div>
                                <div style="text-align: center;">
                                    <div style="font-size: 1.1em; font-weight: 600;">${attempt.tScore}</div>
                                    <div style="font-size: 0.85em; opacity: 0.8;">T-Score</div>
                                </div>
                                ${attempt.rank <= 100 ? `
                                <div style="text-align: center;">
                                    <div style="font-size: 1.1em; font-weight: 600;">#${attempt.rank}</div>
                                    <div style="font-size: 0.85em; opacity: 0.8;">อันดับ</div>
                                </div>
                                ` : '<div></div>'}
                            </div>
                            `;
                        }).join('')}
                    </div>
                    ${resultData.attempts.length > 1 ? `
                    <p style="margin-top: 15px; text-align: center; color: #666; font-size: 0.9em;">
                        <i class="fas fa-info-circle"></i> แสดงคะแนนสูงสุด (ครั้งที่ ${resultData.attempts.findIndex(a => a.rawScore === result.rawScore) + 1})
                    </p>
                    ` : ''}
                </div>
                `;
            }

            content.innerHTML = `
                ${medalHTML}
                
                <div class="score-display">
                    <div class="raw-score">${displayScore}</div>
                    <div class="score-label">คะแนนดิบ (จาก ${maxScore}) ${totalAttempts > 1 ? '- คะแนนสูงสุด' : ''}</div>
                </div>

                ${percentile > 0 ? `
                <div class="percentile" style="display:none;">
                    <div>คุณทำได้ดีกว่า</div>
                    <div class="percentile-value">${percentile}%</div>
                    <div>ของผู้เข้าสอบทั้งหมด</div>
                </div>
                ` : ''}

                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-label">คะแนน T-Score</div>
                        <div class="stat-value">${result.tScore}</div>
                    </div>
                    ${result.rank <= 100 ? `
                    <div class="stat-item">
                        <div class="stat-label">ลำดับที่</div>
                        <div class="stat-value">${result.rank}</div>
                    </div>
                    ` : ''}
                    <div class="stat-item">
                        <div class="stat-label">คะแนนเฉลี่ย</div>
                        <div class="stat-value">${displayMean}</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">จำนวนผู้สอบ</div>
                        <div class="stat-value">${stats?.totalStudents || 0}</div>
                    </div>
                </div>
                
                ${attemptsHTML}
                
                ${result.rank > 10 ? `
                <div style="background: linear-gradient(135deg, ${subject === 'math' ? '#667eea 0%, #764ba2' : '#56ab2f 0%, #a8e063'} 100%); 
                            border-radius: 15px; 
                            padding: 20px; 
                            margin-top: 25px; 
                            color: white; 
                            text-align: center;
                            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);">
                    <i class="fas fa-heart" style="font-size: 2em; margin-bottom: 10px; color: #FFD700;"></i>
                    <p style="font-size: 1.2em; font-weight: 600; margin-bottom: 10px;">
                        💪 ${subject === 'math' ? 'อย่าท้อแท้! คณิตฝึกได้' : 'อย่าเครียดนะ เดินหน้าต่อไป'}
                    </p>
                    <p style="font-size: 0.95em; opacity: 0.95; line-height: 1.6;">
                        ${subject === 'math' 
                            ? 'คณิตศาสตร์ต้องอาศัยการฝึกฝนและความเข้าใจ<br>ลองทบทวนจุดที่ผิดและฝึกอีกครั้งนะ<br><strong style="color: #FFD700;">✨ ยิ่งฝึกยิ่งเก่ง! ไฟท์ๆ! ✨</strong>'
                            : 'คะแนนไม่ได้บ่งบอกความสามารถทั้งหมดของน้องๆเลย<br>สิ่งสำคัญคือการเรียนรู้และพัฒนาตัวเองให้พร้อมในวันสอบจริงนะ<br><strong style="color: #FFD700;">✨ ทำได้แน่! Keep going! ✨</strong>'
                        }
                    </p>
                </div>
                ` : ''}
            `;
        }

        function displayNoScore(subject) {
            const content = document.getElementById(`${subject}Content`);
            const status = document.getElementById(`${subject}Status`);

            status.innerHTML = `<i class="fas fa-times-circle" style="color: #dc3545;"></i> ยังไม่มีคะแนน`;

            content.innerHTML = `
                <div class="no-score">
                    <i class="fas fa-inbox"></i>
                    <p style="font-size: 1.2em;">ยังไม่มีคะแนน</p>
                    <p style="margin-top: 10px;">หากสงสัยกรุณาติดต่อ LINE Open Chat</p>
                </div>
            `;
        }

        function displayPendingRelease(subject, releaseDate) {
            const content = document.getElementById(`${subject}Content`);
            const status = document.getElementById(`${subject}Status`);

            status.innerHTML = `<i class="fas fa-clock" style="color: #ffc107;"></i> รอประกาศผล`;

            // Format release date
            const options = { 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit',
                timeZone: 'Asia/Bangkok'
            };
            const releaseDateStr = releaseDate.toLocaleString('th-TH', options);

            content.innerHTML = `
                <div class="no-score">
                    <i class="fas fa-hourglass-half" style="font-size: 3em; color: #ffc107; margin-bottom: 20px;"></i>
                    <p style="font-size: 1.3em; font-weight: 600; color: #333;">ยังไม่ประกาศผล</p>
                    <p style="margin-top: 15px; color: #666;">ผลคะแนนจะประกาศในวันที่</p>
                    <p style="font-size: 1.1em; font-weight: 600; color: #667eea; margin-top: 10px;">${releaseDateStr} น.</p>
                    <p style="margin-top: 20px; color: #999; font-size: 0.95em;">กรุณากลับมาตรวจสอบอีกครั้ง</p>
                </div>
            `;
        }

        function showError(message) {
            console.error('=== showError called ===');
            console.error('Error message:', message);
            
            document.getElementById('loading').style.display = 'none';
            document.getElementById('resultsContainer').style.display = 'none';
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorText').textContent = message;
            
            // Also show SweetAlert for better visibility
            Swal.fire({
                icon: 'error',
                title: 'เกิดข้อผิดพลาด',
                text: message,
                confirmButtonColor: '#667eea',
                confirmButtonText: 'ตกลง'
            });
        }
    </script>
</body>
</html>
